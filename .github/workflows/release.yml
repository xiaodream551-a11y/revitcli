name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: [self-hosted, windows, revit2026]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Build CLI
        run: dotnet publish src/RevitCli -c Release -o ./stage/bin /p:Version=${{ steps.version.outputs.VERSION }}

      # Build add-in per Revit year
      # 2024: net48, 2025: net8.0-windows, 2026: net8.0-windows
      - name: Build Add-in (Revit 2026)
        run: dotnet publish src/RevitCli.Addin -c Release -f net8.0-windows -p:RevitYear=2026 -o ./stage/addin/2026

      - name: Build Add-in (Revit 2025)
        id: build2025
        run: dotnet publish src/RevitCli.Addin -c Release -f net8.0-windows -p:RevitYear=2025 -o ./stage/addin/2025
        continue-on-error: true

      - name: Build Add-in (Revit 2024)
        id: build2024
        run: dotnet publish src/RevitCli.Addin -c Release -f net48 -p:RevitYear=2024 -o ./stage/addin/2024
        continue-on-error: true

      - name: Detect packaged Revit years
        id: years
        shell: pwsh
        run: |
          $years = @("2026")
          if ("${{ steps.build2025.outcome }}" -eq "success") { $years += "2025" }
          if ("${{ steps.build2024.outcome }}" -eq "success") { $years += "2024" }
          $label = $years -join ", "
          echo "YEARS=$label" >> $env:GITHUB_OUTPUT

      - name: Copy install scripts
        shell: pwsh
        run: |
          Copy-Item scripts/install.ps1 ./stage/
          Copy-Item scripts/uninstall.ps1 ./stage/

      - name: Update version in install script
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = Get-Content ./stage/install.ps1 -Raw
          $content = $content -replace 'version\s*=\s*"\d+\.\d+\.\d+"', "version      = `"$version`""
          Set-Content ./stage/install.ps1 -Value $content
          if ($content -notmatch [regex]::Escape($version)) {
            Write-Host "::error::Failed to inject version $version into install.ps1"
            exit 1
          }

      - name: Package ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path ./stage/* -DestinationPath ./revitcli-win-x64.zip

      - name: Generate checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash ./revitcli-win-x64.zip -Algorithm SHA256).Hash
          "$hash  revitcli-win-x64.zip" | Set-Content ./SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            revitcli-win-x64.zip
            SHA256SUMS.txt
          body: |
            ## RevitCli ${{ github.ref_name }}

            Supports Revit ${{ steps.years.outputs.YEARS }}.

            ### Install
            ```powershell
            Expand-Archive .\revitcli-win-x64.zip -DestinationPath .\revitcli
            cd .\revitcli
            powershell -ExecutionPolicy Bypass -File .\install.ps1

            # Restart Revit, then verify
            revitcli doctor
            ```

            ### Uninstall
            ```powershell
            powershell -ExecutionPolicy Bypass -File "%LocalAppData%\RevitCli\uninstall.ps1"
            ```

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          generate_release_notes: false
